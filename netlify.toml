# ============================================================
#  NETLIFY CONFIGURATION — Pieu Longueuil
# ============================================================

[build]
  publish = "."          # Le dossier racine contient index.html
  # Pas de commande de build — site 100% statique

# ── Redirects requis pour Netlify Identity (authentification admin) ──
[[redirects]]
  from  = "/admin/"
  to    = "/admin/index.html"
  status = 200

# Redirige les tokens d'invitation et de récupération vers la page admin
[[redirects]]
  from  = "/#*"
  to    = "/"
  status = 200

# ── Headers de sécurité ──────────────────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Cache pour les assets statiques ─────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
