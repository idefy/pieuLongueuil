# Decap CMS — Pieu Longueuil
backend:
  name: git-gateway
  repo: idefy/pieuLongueuil
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/297b88fe-6a99-44a6-a5ea-0fbf810e83a6/pkce
  auth_token_endpoint: /sites/297b88fe-6a99-44a6-a5ea-0fbf810e83a6/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://pieulongueuil.ca

media_folder: "assets"
public_folder: "/assets"
locale: fr

collections:

  - name: "leaders"
    label: "👥 Dirigeants"
    label_singular: "Dirigeant"
    description: "Modifier les dirigeants — nom, appel, photo."
    files:
      - name: "leaders"
        label: "Liste des dirigeants"
        file: "data/leaders.json"
        fields:
          - label: "Dirigeants"
            name: "leaders"
            widget: "list"
            label_singular: "Dirigeant"
            summary: "{{fields.name}} — {{fields.org}}"
            fields:
              - { label: "ID unique", name: id, widget: string }
              - label: "Organisation"
                name: org
                widget: select
                options:
                  - { label: "Présidence de Pieu", value: presidence }
                  - { label: "Grand Conseil", value: grandconseil }
                  - { label: "Société de Secours", value: ss }
                  - { label: "Jeunes Filles", value: jf }
                  - { label: "Jeunes Gens", value: jg }
                  - { label: "Primaire", value: primaire }
                  - { label: "École du Dimanche", value: ecole }
                  - { label: "Jeunes Adultes Célibataires", value: jas }
              - label: "Rôle"
                name: role
                widget: object
                fields:
                  - { label: "Français", name: fr, widget: string }
                  - { label: "Español", name: es, widget: string, required: false }
                  - { label: "English", name: en, widget: string, required: false }
              - { label: "Nom complet", name: name, widget: string }
              - label: "Photo"
                name: photo
                widget: image
                media_folder: "/assets"
                public_folder: "/assets"
              - { label: "Actif", name: active, widget: boolean, default: true }
              - label: "Responsabilité (optionnel)"
                name: responsibility
                widget: object
                required: false
                hint: "Affiché en italique sous le rôle — laisser vide pour masquer"
                fields:
                  - { label: "Français", name: fr, widget: string, required: false }
                  - { label: "Español",  name: es, widget: string, required: false }
                  - { label: "English",  name: en, widget: string, required: false }

  - name: "member_resources"
    label: "👥 Ressources pour les membres"
    label_singular: "Boîte de ressources"
    description: "Les 6 boîtes de la section Ressources — titres, descriptions et liens pour les membres."
    files:
      - name: "member_resources"
        label: "Les 6 boîtes de ressources"
        file: "data/member-resources.json"
        fields:
          - label: "Boîtes"
            name: member_resources
            widget: list
            label_singular: "Boîte"
            summary: "{{fields.id}}"
            fields:
              - { label: "ID unique", name: id, widget: string }
              - label: "Icône"
                name: icon
                widget: select
                options: [settings, star, trendingUp, calendar, book, mail, heart, users, globe, file, database]
              - label: "Titre"
                name: title
                widget: object
                fields:
                  - { label: "Français", name: fr, widget: string }
                  - { label: "Español",  name: es, widget: string, required: false }
                  - { label: "English",  name: en, widget: string, required: false }
              - label: "Description"
                name: description
                widget: object
                fields:
                  - { label: "Français", name: fr, widget: text }
                  - { label: "Español",  name: es, widget: text, required: false }
                  - { label: "English",  name: en, widget: text, required: false }
              - label: "Liens"
                name: links
                widget: list
                label_singular: "Lien"
                summary: "{{fields.href}}"
                fields:
                  - label: "Étiquette personnalisée (FR)"
                    name: label_fr
                    widget: string
                    required: false
                    hint: "Si vide, utilise la clé de traduction ci-dessous"
                  - { label: "Étiquette (ES)", name: label_es, widget: string, required: false }
                  - { label: "Étiquette (EN)", name: label_en, widget: string, required: false }
                  - label: "Clé de traduction"
                    name: labelKey
                    widget: string
                    required: false
                    hint: "Clé i18n existante, ex: res_outils_create — ignorée si étiquette personnalisée fournie"
                  - { label: "URL / modal (ex: modal:compte-eglise)", name: href, widget: string }

  - name: "dirigeants_resources"
    label: "📋 Pour les dirigeants — Ressources"
    label_singular: "Ressource"
    description: "Guides, tutoriels et liens officiels pour les dirigeants."
    files:
      - name: "dirigeants_resources"
        label: "Ressources pour les dirigeants"
        file: "data/resources.json"
        fields:
          - label: "Ressources"
            name: "resources"
            widget: "list"
            label_singular: "Ressource"
            summary: "{{fields.id}} — {{fields.type}}"
            fields:
              - { label: "ID unique", name: id, widget: string }
              - label: "Catégorie"
                name: category
                widget: select
                options:
                  - { label: "Vision",    value: vision }
                  - { label: "Guides",    value: guides }
                  - { label: "Tutoriels", value: tutoriels }
                  - { label: "Officiel",  value: officiel }
              - label: "Type"
                name: type
                widget: select
                options:
                  - { label: "Guide",       value: guide }
                  - { label: "Processus",   value: process }
                  - { label: "Information", value: information }
                  - { label: "Vidéo",       value: video }
                  - { label: "Formation",   value: formation }
                  - { label: "Rapport",     value: rapport }
              - label: "Titre"
                name: title
                widget: object
                fields:
                  - { label: "Français", name: fr, widget: string }
                  - { label: "Español",  name: es, widget: string, required: false }
                  - { label: "English",  name: en, widget: string, required: false }
              - label: "Description"
                name: description
                widget: object
                fields:
                  - { label: "Français", name: fr, widget: text }
                  - { label: "Español",  name: es, widget: text, required: false }
                  - { label: "English",  name: en, widget: text, required: false }
              - { label: "URL / lien (ex: modal:mon-id)", name: url,      widget: string, required: false }
              - label: "Icône"
                name: icon
                widget: select
                options: [book, heart, users, star, globe, calendar, settings, trendingUp, video, file, target, database]
              - { label: "Lien externe (nouvel onglet)", name: external, widget: boolean, default: false }
              - { label: "Actif", name: active, widget: boolean, default: true }
              - { label: "Section (ne pas changer)", name: section, widget: hidden, default: dirigeants }
              - label: "Responsabilité (optionnel)"
                name: responsibility
                widget: object
                required: false
                hint: "Affiché en italique sous le rôle — laisser vide pour masquer"
                fields:
                  - { label: "Français", name: fr, widget: string, required: false }
                  - { label: "Español",  name: es, widget: string, required: false }
                  - { label: "English",  name: en, widget: string, required: false }

  - name: "modals"
    label: "🪟 Fenêtres modales"
    label_singular: "Modale"
    description: "Fenêtres d'information. Lier avec href=\"modal:votre-id\"."
    folder: "data/modals"
    create: true
    extension: json
    format: json
    slug: "{{fields.modal_id}}"
    identifier_field: modal_id
    summary: "{{fields.modal_id}} — {{fields.title_fr}}"
    fields:
      - { label: "ID unique", name: modal_id, widget: string, hint: "Ex: rendez-vous  —  utilisé dans href=\"modal:rendez-vous\"" }
      - label: "Icône"
        name: icon
        widget: select
        options: [cal, book, heart, users, star, globe, settings, trendingUp, video, file, target, database]
        default: file
        required: false
      - { label: "En-tête (FR)", name: eyebrow_fr, widget: string }
      - { label: "En-tête (ES)", name: eyebrow_es, widget: string, required: false }
      - { label: "En-tête (EN)", name: eyebrow_en, widget: string, required: false }
      - { label: "Titre (FR)", name: title_fr, widget: string }
      - { label: "Titre (ES)", name: title_es, widget: string, required: false }
      - { label: "Titre (EN)", name: title_en, widget: string, required: false }
      - label: "Sections"
        name: sections
        widget: list
        label_singular: "Section"
        summary: "{{fields.type}}"
        types:
          - label: "📝 Introduction"
            name: intro
            widget: object
            fields:
              - { label: "Texte (FR)", name: text_fr, widget: text }
              - { label: "Texte (ES)", name: text_es, widget: text, required: false }
              - { label: "Texte (EN)", name: text_en, widget: text, required: false }
          - label: "📌 Titre de section"
            name: heading
            widget: object
            fields:
              - { label: "Titre (FR)", name: text_fr, widget: string }
              - { label: "Titre (ES)", name: text_es, widget: string, required: false }
              - { label: "Titre (EN)", name: text_en, widget: string, required: false }
          - label: "¶ Paragraphe"
            name: body
            widget: object
            fields:
              - { label: "Texte (FR)", name: text_fr, widget: text }
              - { label: "Texte (ES)", name: text_es, widget: text, required: false }
              - { label: "Texte (EN)", name: text_en, widget: text, required: false }
          - label: "📋 Liste à puces"
            name: list
            widget: object
            fields:
              - label: "Éléments"
                name: items
                widget: list
                summary: "{{fields.text_fr}}"
                fields:
                  - { label: "Texte (FR)", name: text_fr, widget: string }
                  - { label: "Texte (ES)", name: text_es, widget: string, required: false }
                  - { label: "Texte (EN)", name: text_en, widget: string, required: false }
          - label: "🔗 Liste de liens"
            name: linklist
            widget: object
            fields:
              - label: "Liens"
                name: items
                widget: list
                summary: "{{fields.label_fr}}"
                fields:
                  - { label: "Étiquette (FR)", name: label_fr, widget: string }
                  - { label: "Étiquette (ES)", name: label_es, widget: string, required: false }
                  - { label: "Étiquette (EN)", name: label_en, widget: string, required: false }
                  - { label: "URL", name: url, widget: string }
          - label: "🖼️ Image"
            name: image
            widget: object
            fields:
              - label: "Image"
                name: src
                widget: image
                media_folder: "/assets"
                public_folder: "/assets"
              - { label: "Texte alt", name: alt_fr, widget: string }
          - label: "— Séparateur"
            name: divider
            widget: object
            fields:
              - { label: "Note (ignorée)", name: _note, widget: string, required: false }
          - label: "📎 Note"
            name: note
            widget: object
            fields:
              - { label: "Texte (FR)", name: text_fr, widget: text }
              - { label: "Texte (ES)", name: text_es, widget: text, required: false }
              - { label: "Texte (EN)", name: text_en, widget: text, required: false }
          - label: "🔘 Bouton"
            name: cta
            widget: object
            fields:
              - { label: "Étiquette (FR)", name: label_fr, widget: string }
              - { label: "Étiquette (ES)", name: label_es, widget: string, required: false }
              - { label: "Étiquette (EN)", name: label_en, widget: string, required: false }
              - { label: "URL / lien", name: href, widget: string }
              - label: "Style"
                name: style
                widget: select
                options:
                  - { label: "Principal (bleu)", value: primary }
                  - { label: "Secondaire (contour)", value: secondary }
                default: primary

  - name: "fiches"
    label: "🌿 Fiches service pastoral"
    label_singular: "Fiche"
    description: "Les 8 fiches thématiques du service pastoral."
    folder: "data/fiches"
    create: true
    extension: json
    format: json
    slug: "{{fields.fiche_id}}"
    identifier_field: fiche_id
    summary: "{{fields.num}} — {{fields.fiche_id}}"
    fields:
      - { label: "ID unique", name: fiche_id, widget: string }
      - { label: "Numéro", name: num, widget: string }
      - label: "Image"
        name: image
        widget: image
        media_folder: "/assets"
        public_folder: "/assets"
      - { label: "Couleur fond", name: color, widget: string, default: "#1B3A6B" }
      - label: "Titre"
        name: title
        widget: object
        fields:
          - { label: "Français", name: fr, widget: string }
          - { label: "Español", name: es, widget: string, required: false }
          - { label: "English", name: en, widget: string, required: false }
      - label: "Citation"
        name: quote
        widget: object
        fields:
          - { label: "Français", name: fr, widget: text }
          - { label: "Español", name: es, widget: text, required: false }
          - { label: "English", name: en, widget: text, required: false }
      - { label: "Idées famille (FR)", name: ideesFamille_fr, widget: list, field: { label: "Idée", name: item, widget: text } }
      - { label: "Idées famille (ES)", name: ideesFamille_es, widget: list, required: false, field: { label: "Idea", name: item, widget: text } }
      - { label: "Idées famille (EN)", name: ideesFamille_en, widget: list, required: false, field: { label: "Idea", name: item, widget: text } }
      - { label: "Idées service pastoral (FR)", name: ideesPastorale_fr, widget: list, field: { label: "Idée", name: item, widget: text } }
      - { label: "Idées service pastoral (ES)", name: ideesPastorale_es, widget: list, required: false, field: { label: "Idea", name: item, widget: text } }
      - { label: "Idées service pastoral (EN)", name: ideesPastorale_en, widget: list, required: false, field: { label: "Idea", name: item, widget: text } }
      - label: "Ressources de l'Église"
        name: ressourcesEglise
        widget: list
        required: false
        summary: "{{fields.label}}"
        fields:
          - { label: "Étiquette", name: label, widget: string }
          - { label: "URL", name: url, widget: string }
      - label: "Ressources communautaires"
        name: ressourcesCommunautaires
        widget: list
        required: false
        summary: "{{fields.label}}"
        fields:
          - { label: "Étiquette", name: label, widget: string }
          - { label: "URL (optionnel)", name: url, widget: string, required: false }

  - name: "conference"
    label: "📋 Conférence de Pieu"
    description: "Programme accessible via QR code uniquement."
    files:
      - name: "conference"
        label: "Programme"
        file: "data/conference.json"
        fields:
          - { label: "Date", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD MMMM YYYY", time_format: false }
          - { label: "Titre (FR)", name: title_fr, widget: string, default: "Conférence de Pieu" }
          - { label: "Titre (ES)", name: title_es, widget: string, required: false }
          - label: "Sessions"
            name: sessions
            widget: list
            summary: "{{fields.time}} — {{fields.title_fr}}"
            fields:
              - { label: "Heure", name: time, widget: string }
              - { label: "Titre (FR)", name: title_fr, widget: string }
              - label: "Éléments"
                name: items
                widget: list
                summary: "{{fields.time}} — {{fields.title_fr}}"
                fields:
                  - { label: "Heure", name: time, widget: string }
                  - { label: "Élément (FR)", name: title_fr, widget: string }
                  - { label: "Détail (FR)", name: detail_fr, widget: string, required: false }
                  - label: "Type"
                    name: type
                    widget: select
                    default: item
                    options:
                      - { label: "Général", value: item }
                      - { label: "Cantique", value: hymn }
                      - { label: "Prière", value: prayer }
                      - { label: "Discours", value: talk }
                      - { label: "Prélude/Postlude", value: music }

  - name: "settings"
    label: "⚙️ Paramètres du site"
    description: "Couleurs, mission, réseaux sociaux."
    files:
      - name: "settings"
        label: "Paramètres généraux"
        file: "data/settings.json"
        fields:
          - { label: "Nom du pieu", name: stakeName, widget: string }
          - label: "Mission"
            name: mission
            widget: object
            fields:
              - { label: "Français", name: fr, widget: text }
              - { label: "Español", name: es, widget: text, required: false }
              - { label: "English", name: en, widget: text, required: false }
          - label: "Photo de la chapelle"
            name: chapelImage
            widget: image
            media_folder: "/assets"
            public_folder: "/assets"
          - label: "Couleurs"
            name: colors
            widget: object
            fields:
              - { label: "Principale (navy)", name: primary, widget: string }
              - { label: "Accent (or)", name: secondary, widget: string }
              - { label: "Liens", name: accent, widget: string }
              - { label: "Fond (crème)", name: light, widget: string }
              - { label: "Titres (sombre)", name: dark, widget: string }
          - label: "Réseaux sociaux"
            name: social
            widget: object
            fields:
              - { label: "Facebook", name: facebook, widget: string, required: false }
              - { label: "YouTube", name: youtube, widget: string, required: false }
              - { label: "Instagram", name: instagram, widget: string, required: false }
              - { label: "Twitter/X", name: twitter, widget: string, required: false }
          - label: "Bulletin"
            name: newsletter
            widget: object
            fields:
              - { label: "Lien (FR)", name: fr, widget: string, required: false }
              - { label: "Lien (ES)", name: es, widget: string, required: false }

  # ──────────────────────────────────────────────────────────
  #  7. TRADUCTIONS  →  data/i18n/*.json  (un fichier par groupe)
  # ──────────────────────────────────────────────────────────
  - name: "translations"
    label: "🌐 Traductions (FR / ES / EN)"
    description: "Modifier les textes de l'interface dans les trois langues."
    files:
      - name: "tr_nav"
        label: "🧭 Navigation"
        file: "data/i18n/nav.json"
        fields:
          - label: "nav_home"
            name: "nav_home"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "nav_ressources"
            name: "nav_ressources"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "nav_pastoral"
            name: "nav_pastoral"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "nav_dirigeants"
            name: "nav_dirigeants"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "nav_organisations"
            name: "nav_organisations"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
      - name: "tr_accueil"
        label: "🖼️ Accueil"
        file: "data/i18n/accueil.json"
        fields:
          - label: "hero_scroll"
            name: "hero_scroll"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "ressources_title"
            name: "ressources_title"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "ressources_intro"
            name: "ressources_intro"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "pastoral_title"
            name: "pastoral_title"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "pastoral_intro"
            name: "pastoral_intro"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "dirigeants_title"
            name: "dirigeants_title"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "dirigeants_intro"
            name: "dirigeants_intro"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
              - {label: "Español",  name: es, widget: string, required: false}
              - {label: "English",  name: en, widget: string, required: false}
          - label: "org_title"
            name: "org_title"
            widget: object
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - {label: "Français", name: fr, widget: string}
